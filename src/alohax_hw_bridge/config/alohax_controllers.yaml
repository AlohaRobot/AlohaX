controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    both_arms_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    left_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    right_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    left_gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    right_gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster


both_arms_controller:
  ros__parameters:
    joints:
      - left_arm_shoulder_pan
      - left_arm_shoulder_lift
      - left_arm_elbow_flex
      - left_arm_wrist_flex
      - left_arm_wrist_roll
      - vertical_lift
      - right_arm_shoulder_pan
      - right_arm_shoulder_lift
      - right_arm_elbow_flex
      - right_arm_wrist_flex
      - right_arm_wrist_roll
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity


left_arm_controller:
  ros__parameters:
    joints:
      - left_arm_shoulder_pan
      - left_arm_shoulder_lift
      - left_arm_elbow_flex
      - left_arm_wrist_flex
      - left_arm_wrist_roll
      - vertical_lift
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity


right_arm_controller:
  ros__parameters:
    joints:
      - right_arm_shoulder_pan
      - right_arm_shoulder_lift
      - right_arm_elbow_flex
      - right_arm_wrist_flex
      - right_arm_wrist_roll
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity


left_gripper_controller:
  ros__parameters:
    joints:
      - left_arm_gripper
    command_interfaces:
      - position
    state_interfaces:
      - position


right_gripper_controller:
  ros__parameters:
    joints:
      - right_arm_gripper
    command_interfaces:
      - position
    state_interfaces:
      - position
