trajectory_execution:
  allowed_execution_duration_scaling: 2.0
  allowed_goal_duration_margin: 5.0
  allowed_start_tolerance: 0.1

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - /xlerobot/both_arms_controller
    - /xlerobot/left_arm_controller
    - /xlerobot/right_arm_controller
    - /xlerobot/left_gripper_controller
    - /xlerobot/right_gripper_controller

  /xlerobot/both_arms_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - right_arm_shoulder_pan
      - right_arm_shoulder_lift
      - right_arm_elbow_flex
      - right_arm_wrist_flex
      - right_arm_wrist_roll
      - left_arm_shoulder_pan
      - left_arm_shoulder_lift
      - left_arm_elbow_flex
      - left_arm_wrist_flex
      - left_arm_wrist_roll
      - vertical_lift

  /xlerobot/left_arm_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: false
    joints:
      - left_arm_shoulder_pan
      - left_arm_shoulder_lift
      - left_arm_elbow_flex
      - left_arm_wrist_flex
      - left_arm_wrist_roll
      - vertical_lift

  /xlerobot/right_arm_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: false
    joints:
      - right_arm_shoulder_pan
      - right_arm_shoulder_lift
      - right_arm_elbow_flex
      - right_arm_wrist_flex
      - right_arm_wrist_roll

  /xlerobot/left_gripper_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: false
    joints:
      - left_arm_gripper

  /xlerobot/right_gripper_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: false
    joints:
      - right_arm_gripper
